<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PORTFOLIO://ENGINEER</title>
    <meta name="description"
        content="Portfolio of John Doe — Software engineer specializing in distributed systems, low-level architecture, and interfaces that push boundaries.">
    <link rel="preload" href="fonts/Datatype.wdth.wght.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <style>
        /* Critical CSS — inlined for faster first paint */
        @font-face {
            font-family: 'Datatype';
            src: url('fonts/Datatype.wdth.wght.woff2') format('woff2');
            font-weight: 100 900;
            font-stretch: 75% 125%;
            font-display: swap
        }

        :root {
            --bg: #0a0a0a;
            --bg-elevated: #111110;
            --fg: #c8c2b8;
            --fg-dim: #6b6560;
            --fg-bright: #e8e4df;
            --accent: #8a7f72;
            --accent-bright: #b5a898;
            --border: #2a2825;
            --border-bright: #3a3632;
            --highlight: #d4c5ab;
            --error: #8a6f5f;
            --grid-line: rgba(200, 194, 184, 0.04);
            --font-mono: 'Space Mono', 'Courier New', monospace;
            --font-display: 'Datatype', 'Space Mono', monospace;
            --transition-raw: 0.1s steps(2)
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--fg-dim) var(--bg)
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            padding: 0 12.5%
        }

        .grid-line {
            width: 1px;
            height: 100%;
            background: var(--grid-line)
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--fg-bright);
            border-radius: 0;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference
        }

        .cursor-ring {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--fg-dim);
            border-radius: 0;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            will-change: transform, width, height
        }

        @media (hover: none), (pointer: coarse) {
            body { cursor: auto }
            .cursor-dot, .cursor-ring { display: none }
        }

        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            -webkit-backdrop-filter: blur(0px);
            backdrop-filter: blur(0px);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase
        }

        .nav-index {
            color: var(--accent-bright);
            font-variant-numeric: tabular-nums
        }

        .nav-links {
            display: flex;
            gap: 30px
        }

        .nav-link {
            color: var(--fg-dim);
            transition: color var(--transition-raw);
            position: relative
        }

        .section {
            position: relative;
            min-height: 100vh;
            overflow: hidden
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            position: relative
        }

        .hero-layers {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px
        }

        .startup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9998;
            pointer-events: none;
            will-change: transform, opacity
        }

        .hero-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center
        }

        .hero-layer--bg {
            z-index: 2
        }

        .hero-bg-text {
            font-family: var(--font-display);
            font-size: clamp(80px, 18vw, 300px);
            font-weight: 300;
            font-stretch: 125%;
            color: transparent;
            -webkit-text-stroke: 1px var(--border-bright);
            text-stroke: 1px var(--border-bright);
            letter-spacing: -0.04em;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none
        }

        .hero-layer--mid {
            z-index: 4;
            flex-direction: column;
            gap: 0;
            pointer-events: none
        }

        .hero-tag {
            font-family: var(--font-display);
            font-size: clamp(18px, 3vw, 42px);
            font-weight: 600;
            font-stretch: 75%;
            letter-spacing: 0.3em;
            color: var(--fg-dim);
            text-transform: uppercase
        }

        .hero-tag--top {
            transform: translateX(-30%)
        }

        .hero-tag--bottom {
            transform: translateX(30%)
        }

        .hero-layer--name {
            z-index: 6
        }

        .hero-name {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0
        }

        .hero-name-line {
            font-family: var(--font-display);
            font-size: clamp(60px, 14vw, 220px);
            font-weight: 700;
            font-stretch: 100%;
            color: var(--fg-bright);
            line-height: 0.85;
            letter-spacing: -0.03em;
            display: block
        }

        .hero-name-line[data-line="2"] {
            color: transparent;
            -webkit-text-stroke: 2px var(--fg-bright);
            text-stroke: 2px var(--fg-bright)
        }

        .hero-layer--fg {
            z-index: 8;
            pointer-events: none
        }

        .hero-debris {
            position: absolute;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--accent);
            opacity: 0.5
        }

        .hero-debris--1 {
            top: 20%;
            left: 8%
        }

        .hero-debris--2 {
            top: 15%;
            right: 12%
        }

        .hero-debris--3 {
            bottom: 25%;
            left: 15%;
            color: var(--accent);
            opacity: 0.55
        }

        .hero-debris--4 {
            top: 30%;
            right: 25%;
            font-size: 80px;
            font-family: var(--font-display);
            font-weight: 200;
            color: var(--accent);
            opacity: 0.15
        }

        .hero-debris--5 {
            bottom: 20%;
            right: 8%
        }

        .hero-bracket {
            position: absolute;
            font-family: var(--font-display);
            font-size: clamp(120px, 25vw, 400px);
            font-weight: 200;
            color: var(--border-bright);
            opacity: 0.3;
            line-height: 1
        }

        .hero-bracket--left {
            left: 5%;
            top: 50%;
            transform: translateY(-50%)
        }

        .hero-bracket--right {
            right: 5%;
            top: 50%;
            transform: translateY(-50%)
        }

        .hero-meta {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10
        }

        .hero-meta-line {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: var(--fg-dim);
            text-transform: uppercase
        }

        .hero-scroll-indicator {
            font-size: 20px;
            animation: scroll-bounce 1.5s steps(3) infinite
        }

        .hero-social-float {
            position: absolute;
            width: 44px;
            height: 44px;
            pointer-events: none;
            will-change: transform
        }

        .hero-social-float--github {
            top: 25%;
            left: 62%;
            animation: social-float-github 4s ease-in-out infinite
        }

        .hero-social-float--linkedin {
            top: 70%;
            right: 62%;
            animation: social-float-linkedin 4.5s ease-in-out infinite
        }

        @keyframes social-float-github {
            0%, 100% { transform: translate3d(0, 0, 0) }
            50% { transform: translate3d(0, -14px, 0) }
        }

        @keyframes social-float-linkedin {
            0%, 100% { transform: translate3d(0, 0, 0) }
            50% { transform: translate3d(0, -12px, 0) }
        }

        .hero-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            color: var(--accent-bright);
            opacity: 0.7;
            pointer-events: auto;
            transition: color var(--transition-raw);
            text-decoration: none;
            will-change: transform, opacity
        }

        .hero-social svg {
            width: 100%;
            height: 100%
        }

        .hero-social:hover {
            color: var(--highlight)
        }

        .hero-social--github {
            transform: rotate(-8deg);
            opacity: 0.6
        }

        .hero-social--linkedin {
            transform: rotate(6deg);
            opacity: 0.6
        }

        @media (prefers-reduced-motion: reduce) {
            .hero-social-float--github,
            .hero-social-float--linkedin {
                animation: none
            }

            .hero-glow {
                animation: none
            }

            .startup-overlay {
                display: none !important
            }
        }

        @keyframes scroll-bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(8px)
            }
        }

        /* Hero bottom glow — teases next section */
        .hero-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 320px;
            background:
                radial-gradient(ellipse 100% 100% at 50% 100%, rgba(212, 197, 171, 0.25) 0%, rgba(138, 127, 114, 0.12) 40%, transparent 75%);
            pointer-events: none;
            z-index: 9
        }

        /* Mobile hamburger — critical for first paint */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 44px;
            height: 44px;
            background: none;
            border: 1px solid var(--border);
            cursor: pointer;
            padding: 0;
            z-index: 1001
        }

        .hamburger-line {
            display: block;
            width: 18px;
            height: 1px;
            background: var(--fg-dim)
        }

        @media (max-width: 600px) {
            .nav-hamburger { display: flex }
            .nav-links { display: none }
            .hero-section {
                height: 100vh;
                height: 100dvh
            }
        }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- NOISE OVERLAY -->
    <div class="noise-overlay"></div>

    <!-- GRID OVERLAY -->
    <div class="grid-overlay">
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
    </div>

    <!-- CURSOR -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- NAV — dynamically populated from YAML -->
    <nav class="nav-bar">
        <div class="nav-index">[000]</div>
        <div class="nav-links" id="navLinks"></div>
        <button class="nav-hamburger" aria-label="Toggle navigation menu" aria-expanded="false">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
    </nav>

    <!-- MOBILE MENU OVERLAY — dynamically populated from YAML -->
    <div class="mobile-menu" aria-hidden="true">
        <div class="mobile-menu-inner" id="mobileMenuLinks"></div>
        <div class="mobile-menu-footer">
            <span>SYS::ACTIVE</span>
            <span>v1.0.0</span>
        </div>
    </div>

    <!-- ==================== HERO SECTION ==================== -->
    <section id="hero" class="section hero-section">
        <div class="hero-layers" id="heroLayers">
            <!-- Dynamically populated from YAML -->
        </div>
        <div class="hero-meta" id="heroMeta">
            <!-- Dynamically populated from YAML -->
        </div>
    </section>

    <!-- ==================== ABOUT SECTION ==================== -->
    <section id="about" class="section about-section">
        <div class="section-label">01_ABOUT</div>
        <div class="about-container" id="aboutContainer">
            <!-- Dynamically populated from YAML -->
        </div>
        <!-- Debris appended directly here from JS -->
    </section>

    <!-- ==================== PROJECTS SECTION ==================== -->
    <section id="projects" class="section projects-section">
        <div class="section-label">02_PROJECTS</div>
        <div class="projects-bg-text" id="projectsBgText">WORK</div>
        <div class="projects-stack" id="projectsStack">
            <!-- Dynamically populated from YAML -->
        </div>
        <!-- Debris appended directly here from JS -->
        <div class="projects-heading-block" id="projectsHeadingBlock">
            <!-- Dynamically populated from YAML -->
        </div>
    </section>

    <!-- ==================== EXPERIENCE SECTION ==================== -->
    <section id="experience" class="section experience-section">
        <div class="section-label">03_EXPERIENCE</div>
        <div class="exp-container" id="expContainer">
            <!-- Dynamically populated from YAML -->
        </div>
        <div class="exp-bg-text">WORK</div>
        <!-- Debris appended directly here from JS -->
    </section>

    <!-- ==================== CONTACT SECTION ==================== -->
    <section id="contact" class="section contact-section">
        <div class="section-label">04_CONTACT</div>
        <!-- Debris appended directly here from JS -->
        <div class="contact-container" id="contactContainer">
            <!-- Dynamically populated from YAML -->
        </div>
        <div class="contact-footer" id="contactFooter">
            <!-- Dynamically populated from YAML -->
        </div>
    </section>

    <!-- SCRIPTS — deferred for parallel download and non-blocking execution -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" defer></script>
    <script src="js/main.js" defer></script>
</body>

</html>
